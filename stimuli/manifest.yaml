# NeuroAuRA Stimulus Manifest
# ============================
# All audio stimuli must be CC-BY or CC0 licensed.
# DO NOT add CC-BY-NC or copyrighted content.
#
# To add a stimulus:
# 1. Place the file in stimuli/audio/<category>/
# 2. Add an entry below with the SHA-256 checksum, license, and source URL.
# 3. Compute the envelope cache:
#      neuroaura stimulus cache stimuli/manifest.yaml
#    (This pre-computes the gammatone envelope at 512 Hz and saves as .npy)
#
# Categories:
#   speech/   : naturalistic speech (podcasts, narratives)
#   music/    : musical instruments and ensemble recordings
#   ci_rehab/ : controlled stimuli for cochlear implant rehabilitation
#   synthetic/: pure tones, filtered noise, TTS speech

version: "1.0"

stimuli:
  # ── Speech — CC0 / Public Domain ────────────────────────────────────────────
  - id: librivox_alice_ch1
    category: speech
    file: audio/speech/librivox_alice_ch1_mono.wav
    sha256: null              # fill in after downloading
    duration_s: 180.0
    sample_rate: 44100
    speaker: female
    language: en
    description: "Alice in Wonderland Ch.1 — LibriVox (Public Domain)"
    license: CC0
    source_url: "https://librivox.org/alice-in-wonderland-by-lewis-carroll/"
    envelope_cache: cache/librivox_alice_ch1_env_512hz.npy

  - id: librivox_alice_ch2
    category: speech
    file: audio/speech/librivox_alice_ch2_mono.wav
    sha256: null
    duration_s: 210.0
    sample_rate: 44100
    speaker: female
    language: en
    description: "Alice in Wonderland Ch.2 — LibriVox (Public Domain)"
    license: CC0
    source_url: "https://librivox.org/alice-in-wonderland-by-lewis-carroll/"
    envelope_cache: cache/librivox_alice_ch2_env_512hz.npy

  # ── Music — CC-BY instruments ─────────────────────────────────────────────
  - id: piano_bach_invention_1
    category: music
    file: audio/music/piano_bach_invention_1.wav
    sha256: null
    duration_s: 120.0
    sample_rate: 44100
    instrument: piano
    genre: classical
    description: "Bach Two-Part Invention No. 1 in C major — Musopen (CC0)"
    license: CC0
    source_url: "https://musopen.org/music/1357-two-part-inventions-bwv-772-786/"
    envelope_cache: cache/piano_bach_invention_1_env_512hz.npy

  - id: guitar_solo_classical
    category: music
    file: audio/music/guitar_solo_classical.wav
    sha256: null
    duration_s: 150.0
    sample_rate: 44100
    instrument: classical_guitar
    genre: classical
    description: "Classical guitar solo — Musopen (CC0)"
    license: CC0
    source_url: "https://musopen.org/"
    envelope_cache: cache/guitar_solo_classical_env_512hz.npy

  # ── CI Rehabilitation — Synthetic stimuli ─────────────────────────────────
  - id: ci_rehab_pure_250hz
    category: ci_rehab
    file: audio/ci_rehab/pure_tone_250hz_2s.wav
    sha256: null              # generated locally, no download needed
    duration_s: 2.0
    sample_rate: 44100
    frequency_hz: 250
    description: "Pure tone 250 Hz, 2 s — synthetic"
    license: CC0
    generated: true           # generated by neuroaura.stimulus.generate_tones
    envelope_cache: cache/ci_rehab_pure_250hz_env_512hz.npy

  - id: ci_rehab_pure_500hz
    category: ci_rehab
    file: audio/ci_rehab/pure_tone_500hz_2s.wav
    sha256: null
    duration_s: 2.0
    sample_rate: 44100
    frequency_hz: 500
    description: "Pure tone 500 Hz, 2 s — synthetic"
    license: CC0
    generated: true
    envelope_cache: cache/ci_rehab_pure_500hz_env_512hz.npy

  - id: ci_rehab_noise_band
    category: ci_rehab
    file: audio/ci_rehab/noise_band_1k_4k_hz.wav
    sha256: null
    duration_s: 30.0
    sample_rate: 44100
    description: "Bandpass filtered noise 1–4 kHz, 30 s — CI fitting range"
    license: CC0
    generated: true
    envelope_cache: cache/ci_rehab_noise_band_env_512hz.npy
